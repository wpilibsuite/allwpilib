[build-system]
build-backend = "hatchling.build"
requires = [
    "semiwrap~=0.6.0",
    "hatch-meson~=0.1.2",
    "hatch-robotpy~=0.2.1",
    "hatchling",
    "robotpy-native-tunable==0.0.0",
    "robotpy-wpiutil==0.0.0",
]

[project]
name = "robotpy-tunable"
version = "0.0.0"
description = "Binary wrapper for WPILib tunable library"
requires-python = ">=3.11"
authors = [
    {name = "RobotPy Development Team", email = "robotpy@googlegroups.com"},
]
license = "BSD-3-Clause"
dependencies = [
    "robotpy-native-tunable==0.0.0",
    "robotpy-wpiutil==0.0.0",
]

[project.urls]
"Source code" = "https://github.com/robotpy/mostrobotpy"

[tool.hatch.build.hooks.robotpy]
version_file = "tunable/version.py"

[tool.hatch.build.hooks.semiwrap]

[tool.hatch.build.hooks.meson]

[tool.hatch.build.targets.wheel]
packages = ["tunable"]

[tool.semiwrap]
update_init = [
    "tunable"
]
scan_headers_ignore = [
    "wpi/tunable/ComplexTunable.hpp",
    "wpi/tunable/CustomTunable.hpp",
    "wpi/tunable/MockTunableBackend.hpp",
    "wpi/tunable/Selectable.hpp",
    "wpi/tunable/Tunable.hpp",
    "wpi/tunable/TunableConfig.hpp",
    "wpi/tunable/TunableRegistry.hpp",
    "wpi/tunable/TunableTable.hpp",
    "wpi/tunable/Tunables.hpp",
    "wpi/tunable/detail/TunableBase.hpp",
    "wpi/tunable/detail/TunableDetail.hpp",
    "wpi/tunable/detail/TunableMember.hpp",
    "wpi/tunable/detail/TunableTypeTraits.hpp",
    "wpi/tunable/detail/TunableTypeValue.hpp",
]

[tool.semiwrap.name_transform]
default = "snake_case"
enum_value = "CAPS_CASE"
known_words = ["3V3", "5V", "CAN", "CPU", "DS", "FMS", "FPGA", "HAL", "HTTP", "I2C", "IMU", "JNI", "JSON", "mDNS", "NT", "OpMode", "PCM", "PDH", "PDP", "PID", "POVs", "PWM", "RIO", "SPI", "URI", "URL", "USB", "VIn"]

[tool.semiwrap.extension_modules."tunable._tunable"]
name = "tunable"
wraps = ["robotpy-native-tunable"]
depends = ["wpiutil"]

[tool.semiwrap.extension_modules."tunable._tunable".headers]
TunableBackend = "wpi/tunable/TunableBackend.hpp"
