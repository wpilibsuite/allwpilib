[build-system]
build-backend = "hatchling.build"
requires = [
    "hatchling",
    "hatch-nativelib~=0.2.0",
    "hatch-robotpy~=0.2.1",
    "robotpy-native-wpiutil==0.0.0",
]

[project]
name = "robotpy-native-tunable"
version = "0.0.0"
description = "WPILib Tunable Library"
license = "BSD-3-Clause"

dependencies = [
    "robotpy-native-wpiutil==0.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/native"]

[[tool.hatch.build.hooks.robotpy.maven_lib_download]]
artifact_id = "tunable-cpp"
group_id = "org.wpilib.tunable"
repo_url = ""
version = "0.0.0"

extract_to = "src/native/tunable"
libs = ["tunable"]

[[tool.hatch.build.hooks.nativelib.pcfile]]
pcfile = "src/native/tunable/robotpy-native-tunable.pc"
name = "tunable"

includedir = "src/native/tunable/include"
libdir = "src/native/tunable/lib"
shared_libraries = ["tunable"]
requires = ["robotpy-native-wpiutil"]
