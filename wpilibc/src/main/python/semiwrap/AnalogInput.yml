extra_includes:
- wpi/util/sendable/SendableBuilder.hpp

classes:
  wpi::AnalogInput:
    ignored_bases:
    - wpi::util::SendableHelper<AnalogInput>
    methods:
      AnalogInput:
      GetValue:
      GetVoltage:
      GetChannel:
      SetSimDevice:
      InitSendable:

inline_code: |
  cls_AnalogInput
    .def("__repr__", [](const AnalogInput &self) {
      return py::str("<AnalogInput {}>").format(self.GetChannel());
    });
