extra_includes:
- wpi/telemetry/TelemetryTable.hpp

classes:
  wpi::AnalogInput:
    ignored_bases:
    - wpi::TelemetryLoggable  # TODO(telemetry PR)
    methods:
      AnalogInput:
      GetValue:
      GetVoltage:
      GetChannel:
      SetSimDevice:
      LogTo:
      GetTelemetryType:

inline_code: |
  cls_AnalogInput
    .def("__repr__", [](const AnalogInput &self) {
      return py::str("<AnalogInput {}>").format(self.GetChannel());
    });
