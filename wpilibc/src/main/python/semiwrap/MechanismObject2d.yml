extra_includes:
- wpi/telemetry/TelemetryTable.hpp
- wpi/smartdashboard/MechanismLigament2d.hpp

classes:
  wpi::MechanismObject2d:
    ignored_bases:
    - wpi::TelemetryLoggable  # TODO(telemetry PR)
    force_type_casters:
    - wpi::units::degree_t
    attributes:
      m_mutex:
        ignore: true
    methods:
      GetName:
      Append:
        ignore: true
      MechanismObject2d:
        ignore: true
      LogTo:

# keep this in sync with MechanismRoot2d.yml
inline_code: |-
  cls_MechanismObject2d
    .def("append_ligament", [](MechanismObject2d *self,
      std::string_view name, double length, wpi::units::degree_t angle,
      double line_width, const wpi::util::Color8Bit& color) {
        return self->Append<MechanismLigament2d>(name, length, angle, line_width, color);
      },
      py::arg("name"), py::arg("length"), py::arg("angle"),
      py::arg("line_width") = 6, py::arg("color") = wpi::util::Color8Bit{235, 137, 52},
      "Append a ligament node",
      py::return_value_policy::reference_internal)
    ;
