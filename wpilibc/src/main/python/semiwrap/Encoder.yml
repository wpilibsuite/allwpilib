extra_includes:
- wpi/telemetry/TelemetryTable.hpp

classes:
  wpi::Encoder:
    ignored_bases:
    - wpi::TelemetryLoggable  # TODO(telemetry PR)
    typealias:
    - wpi::Encoder::EncodingType
    methods:
      Encoder:
        overloads:
          int, int, bool, EncodingType:
            param_override:
              encodingType:
                default: wpi::Encoder::EncodingType::X4
          DigitalSource*, DigitalSource*, bool, EncodingType:
            ignore: true
          DigitalSource&, DigitalSource&, bool, EncodingType:
            ignore: true
          std::shared_ptr<DigitalSource>, std::shared_ptr<DigitalSource>, bool, EncodingType:
            param_override:
              encodingType:
                default: wpi::Encoder::EncodingType::X4
      Get:
      Reset:
      GetStopped:
      GetDirection:
      GetRaw:
      GetEncodingScale:
      GetDistance:
      GetRate:
      SetDistancePerPulse:
      GetDistancePerPulse:
      SetReverseDirection:
      SetSimDevice:
      GetFPGAIndex:
      LogTo:
      GetTelemetryType:
