extra_includes:
- wpi/telemetry/TelemetryTable.hpp

classes:
  wpi::DutyCycle:
    ignored_bases:
    - wpi::TelemetryLoggable  # TODO(telemetry PR)
    methods:
      DutyCycle:
        overloads:
          DigitalSource&:
            ignore: true
          DigitalSource*:
            ignore: true
          std::shared_ptr<DigitalSource>:
      GetFrequency:
      GetOutput:
      GetHighTime:
      GetSourceChannel:
      LogTo:
      GetTelemetryType:

inline_code: |
  cls_DutyCycle
    .def("__repr__", [](const DutyCycle &self) {
      return py::str("<DutyCycle {}>").format(self.GetSourceChannel());
    });
