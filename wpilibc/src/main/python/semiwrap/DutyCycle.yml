extra_includes:
- wpi/util/sendable/SendableBuilder.hpp

classes:
  wpi::DutyCycleInput:
    ignored_bases:
    - wpi::util::SendableHelper<DutyCycleInput>
    methods:
      DutyCycleInput:
        overloads:
          DigitalSource&:
            ignore: true
          DigitalSource*:
            ignore: true
          std::shared_ptr<DigitalSource>:
      GetFrequency:
      GetOutput:
      GetHighTime:
      GetSourceChannel:
      InitSendable:

inline_code: |
  cls_DutyCycle
    .def("__repr__", [](const DutyCycleInput &self) {
      return py::str("<DutyCycleInput {}>").format(self.GetSourceChannel());
    });
