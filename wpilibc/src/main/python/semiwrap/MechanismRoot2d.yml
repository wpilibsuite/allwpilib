extra_includes:
- wpi/smartdashboard/MechanismLigament2d.hpp

classes:
  wpi::MechanismRoot2d:
    force_type_casters:
    - wpi::units::degree_t
    methods:
      MechanismRoot2d:
        ignore: true
      SetPosition:
      GetName:
        ignore: true
      Append:
        ignore: true

# keep this in sync with MechanismRoot2d.h
inline_code: |-
  cls_MechanismRoot2d
    .def("get_name", [](MechanismRoot2d *self) { return self->GetName(); }, release_gil())
    .def("append_ligament", [](MechanismRoot2d *self,
      std::string_view name, double length, wpi::units::degree_t angle,
      double line_width, const wpi::util::Color8Bit& color) {
        return self->Append<MechanismLigament2d>(name, length, angle, line_width, color);
      },
      py::arg("name"), py::arg("length"), py::arg("angle"),
      py::arg("line_width") = 6, py::arg("color") = wpi::util::Color8Bit{235, 137, 52},
      release_gil(), "Append a ligament node",
      py::return_value_policy::reference_internal)
    ;
