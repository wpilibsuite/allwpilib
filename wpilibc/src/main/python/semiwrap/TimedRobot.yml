extra_includes:
- pybind11/chrono.h

classes:
  wpi::TimedRobot:
    attributes:
      DEFAULT_PERIOD:
      m_notifier:
        ignore: true
      m_startTime:
    methods:
      StartCompetition:
      EndCompetition:
      GetLoopStartTime:
      AddPeriodic:
        param_override:
          offset:
            default: 0_s
      TimedRobot:
        overloads:
          wpi::units::second_t:
          wpi::units::hertz_t:
