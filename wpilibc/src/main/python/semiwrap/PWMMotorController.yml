extra_includes:
- wpi/telemetry/TelemetryTable.hpp

classes:
  wpi::PWMMotorController:
    ignored_bases:
    - wpi::TelemetryLoggable  # TODO(telemetry PR)
    attributes:
      m_pwm:
    methods:
      SetThrottle:
      GetThrottle:
      GetVoltage:
      SetInverted:
      GetInverted:
      Disable:
      StopMotor:
      GetDescription:
      GetChannel:
      EnableDeadbandElimination:
      AddFollower:
        overloads:
          PWMMotorController&:
            keepalive:
            - [1, 2]
          T&&:
            ignore: true
      PWMMotorController:
      SetDutyCycleInternal:
      GetDutyCycleInternal:
      SetBounds:
      LogTo:
      GetTelemetryType:
