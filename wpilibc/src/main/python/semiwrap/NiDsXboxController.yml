extra_includes:
- wpi/driverstation/internal/DriverStationBackend.hpp
- wpi/event/BooleanEvent.hpp
- wpi/telemetry/TelemetryTable.hpp

classes:
  wpi::NiDsXboxController:
    force_no_trampoline: true
    ignored_bases:
    - wpi::TelemetryLoggable  # TODO(telemetry PR)
    methods:
      NiDsXboxController:
        overloads:
          int:
          GenericHID&:
      GetHID:
        overloads:
          "":
            return_value_policy: reference_internal
          '[const]':
            ignore: true
      GetLeftX:
      GetRightX:
      GetLeftY:
      GetRightY:
      GetLeftTriggerAxis:
      GetRightTriggerAxis:
      LeftBumper:
      RightBumper:
      GetLeftStickButton:
      GetRightStickButton:
      GetLeftStickButtonPressed:
      GetRightStickButtonPressed:
      GetLeftStickButtonReleased:
      GetRightStickButtonReleased:
      LeftStick:
      RightStick:
      GetAButton:
      GetAButtonPressed:
      GetAButtonReleased:
      A:
      GetBButton:
      GetBButtonPressed:
      GetBButtonReleased:
      B:
      GetXButton:
      GetXButtonPressed:
      GetXButtonReleased:
      X:
      GetYButton:
      GetYButtonPressed:
      GetYButtonReleased:
      Y:
      GetBackButton:
      GetBackButtonPressed:
      GetBackButtonReleased:
      Back:
      GetStartButton:
      GetStartButtonPressed:
      GetStartButtonReleased:
      Start:
      LeftTrigger:
        overloads:
          double, EventLoop* [const]:
          EventLoop* [const]:
      RightTrigger:
        overloads:
          double, EventLoop* [const]:
          EventLoop* [const]:
      GetLeftBumperButton:
      GetLeftBumperButtonPressed:
      GetLeftBumperButtonReleased:
      GetRightBumperButton:
      GetRightBumperButtonPressed:
      GetRightBumperButtonReleased:
      IsConnected:
      GetGamepadType:
      GetSupportedOutputs:
      GetName:
      GetPort:
      SetRumble:
      GetTelemetryType:
      LogTo:
  wpi::NiDsXboxController::Button:
    attributes:
      kLeftBumper:
      kRightBumper:
      kLeftStick:
      kRightStick:
      kA:
      kB:
      kX:
      kY:
      kBack:
      kStart:
  wpi::NiDsXboxController::Axis:
    attributes:
      kLeftX:
      kRightX:
      kLeftY:
      kRightY:
      kLeftTrigger:
      kRightTrigger:
