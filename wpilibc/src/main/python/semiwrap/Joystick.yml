extra_includes:
- wpi/driverstation/internal/DriverStationBackend.hpp

classes:
  wpi::Joystick:
    attributes:
      kDefaultXChannel:
      kDefaultYChannel:
      kDefaultZChannel:
      kDefaultTwistChannel:
      kDefaultThrottleChannel:
    enums:
      AxisType:
      ButtonType:
    methods:
      Joystick:
        overloads:
          int:
          GenericHID&:
            keepalive:
            - [1, 2]
      GetHID:
        return_value_policy: reference_internal
        overloads:
          "":
          '[const]':
            ignore: true
      SetXChannel:
      SetYChannel:
      SetZChannel:
      SetTwistChannel:
      SetThrottleChannel:
      GetXChannel:
      GetYChannel:
      GetZChannel:
      GetTwistChannel:
      GetThrottleChannel:
      GetX:
      GetY:
      GetZ:
      GetTwist:
      GetThrottle:
      GetTrigger:
      GetTriggerPressed:
      GetTriggerReleased:
      Trigger:
      GetTop:
      GetTopPressed:
      GetTopReleased:
      Top:
      GetMagnitude:
      GetDirection:
        rename: getDirectionRadians
      GetGenericHID:
        overloads:
          "":
          '[const]':
            ignore: true
      GetRawButton:
      GetRawButtonPressed:
      GetRawButtonReleased:
      GetRawAxis:
      GetPOV:
    inline_code: |
      .def("getDirectionDegrees", [](const Joystick &self) -> wpi::units::degree_t {
        return self.GetDirection();
      })
