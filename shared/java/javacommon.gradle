apply plugin: 'maven-publish'
apply plugin: 'java-library'
apply plugin: 'jacoco'
apply plugin: 'org.javamodularity.moduleplugin'

def baseArtifactId = project.baseId
def artifactGroupId = project.groupId
def javaBaseName = makeZipBaseName(artifactGroupId, "${baseArtifactId}-java")

def outputsFolder = file("$project.buildDir/outputs")

task sourcesJar(type: Jar, dependsOn: classes) {
    archiveClassifier = 'sources'
    from sourceSets.main.allSource
}

task javadocJar(type: Jar, dependsOn: javadoc) {
    archiveClassifier = 'javadoc'
    from javadoc.destinationDir
}

task outputJar(type: Jar, dependsOn: classes) {
    archiveBaseName = javaBaseName
    destinationDirectory = outputsFolder
    from sourceSets.main.output
}

task outputSourcesJar(type: Jar, dependsOn: classes) {
    archiveBaseName = javaBaseName
    destinationDirectory = outputsFolder
    archiveClassifier = 'sources'
    from sourceSets.main.allSource
}

task outputJavadocJar(type: Jar, dependsOn: javadoc) {
    archiveBaseName = javaBaseName
    destinationDirectory = outputsFolder
    archiveClassifier = 'javadoc'
    from javadoc.destinationDir
}

artifacts {
    tasks.named("assemble") {
        dependsOn(sourcesJar)
        dependsOn(javadocJar)
        dependsOn(outputJar)
        dependsOn(outputSourcesJar)
        dependsOn(outputJavadocJar)
    }
}

addTaskToCopyAllOutputs(outputSourcesJar)
addTaskToCopyAllOutputs(outputJavadocJar)
addTaskToCopyAllOutputs(outputJar)

build.dependsOn outputSourcesJar
build.dependsOn outputJavadocJar
build.dependsOn outputJar

// Projects that generate source code with annotation processors (such as avaje serde classes)
// need to have those generated files on the source path so javadoc can pick them up.
tasks.named('javadoc').configure {
    it.dependsOn('compileJava')
}
sourceSets.main.java.srcDir "${buildDir}/generated/sources/annotationProcessor/java/main"

project(':').libraryBuild.dependsOn build

publishing {
    publications {

        java(MavenPublication) {
            artifact jar
            artifact sourcesJar
            artifact javadocJar

            artifactId = "${baseArtifactId}-java"
            groupId = artifactGroupId
            version = wpilibVersioning.version.get()
        }
    }
}

test {
    jvmArgs '--enable-native-access=org.opencv,wpilib.apriltag,wpilib.hal,wpilib.math,wpilib.ntcore,wpilib.util'
    useJUnitPlatform()
    systemProperty 'junit.jupiter.extensions.autodetection.enabled', 'true'
    testLogging {
        events "failed"
        exceptionFormat = "full"
    }
    finalizedBy jacocoTestReport
}

if (project.hasProperty('onlylinuxsystemcore') || project.hasProperty('onlylinuxarm32') || project.hasProperty('onlylinuxarm64') || project.hasProperty('onlywindowsarm64')) {
    test.enabled = false
}

repositories {
    maven {
        url = 'https://frcmaven.wpi.edu/artifactory/ex-mvn'
    }
    //maven.url "https://oss.sonatype.org/content/repositories/snapshots/"
}

sourceSets {
    dev
}

configurations {
    devImplementation.extendsFrom(implementation)
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs = [
        '--release',
        '25',
        '-encoding',
        'UTF8',
        "-Werror",
        "-Xlint:all",
        // ignore AutoCloseable warnings
        "-Xlint:-try",
        // ignore missing serialVersionUID warnings
        "-Xlint:-serial",
        // ignore unclaimed annotation warning from annotation processing
        "-Xlint:-processing",
        "-Xlint:-preview",
        // ignore modules requiring automatic library modules
        "-Xlint:-requires-automatic",
        "-Xlint:-requires-transitive-automatic",
        "-Xlint:-exports",
        // Java modules warn about exposing classes without an explicitly declared constructor
        "-Xlint:-missing-explicit-ctor",
        // Java modules warn about module names with trailing digits
        "-Xlint:-module",
        "-Xlint:-classfile"
    ]
}

dependencies {
    testImplementation libs.junit.api
    testRuntimeOnly libs.junit.launcher

    devImplementation sourceSets.main.output
}

task run(type: JavaExec) {
    classpath = sourceSets.dev.runtimeClasspath

    mainClass = project.devMain
}

build.dependsOn devClasses

jacoco {
    toolVersion = "0.8.14"
}

jacocoTestReport {
    reports {
        xml.required = true
        html.required = true
    }
}
