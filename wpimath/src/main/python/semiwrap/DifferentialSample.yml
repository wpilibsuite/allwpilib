extra_includes:
- wpystruct.h

functions:
  to_json:
    overloads:
      wpi::util::json&, const DifferentialSample&:
        ignore: true
      wpi::util::json&, const std::vector<DifferentialSample>&:
        ignore: true
  from_json:
    overloads:
      const wpi::util::json&, DifferentialSample&:
        ignore: true
      const wpi::util::json&, std::vector<DifferentialSample>&:
        ignore: true
classes:
  wpi::math::DifferentialSample:
    force_no_trampoline: true
    attributes:
      leftVelocity:
      rightVelocity:
    methods:
      DifferentialSample:
        overloads:
          "":
          ? wpi::units::second_t, const Pose2d&, const ChassisVelocities&, const ChassisAccelerations&, wpi::units::meters_per_second_t, wpi::units::meters_per_second_t
          :
          ? wpi::units::second_t, const Pose2d&, const ChassisVelocities&, const ChassisAccelerations&, const DifferentialDriveKinematics&
          :
          const HolonomicSample&, wpi::units::meters_per_second_t, wpi::units::meters_per_second_t:
          const HolonomicSample&, const DifferentialDriveKinematics&:
          const DrivetrainSplineSample&, const DifferentialDriveKinematics&:
      Transform:
      RelativeTo:
      operator==:

inline_code: |
  SetupWPyStruct<wpi::math::DifferentialSample>(cls_DifferentialSample);
