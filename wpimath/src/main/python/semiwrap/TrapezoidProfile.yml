classes:
  wpi::math::TrapezoidProfile:
    force_type_casters:
    - wpi::units::second_t
    - wpi::units::radians_per_second
    - wpi::units::radians_per_second_squared
    template_params:
    - Distance
    doc: |
      A trapezoid-shaped velocity profile.

      While this class can be used for a profiled movement from start to finish,
      the intended usage is to filter a reference's dynamics based on trapezoidal
      velocity constraints. To compute the reference obeying this constraint, do
      the following.

      Initialization::

        constraints = TrapezoidProfile.Constraints(kMaxV, kMaxA)
        previous_profiled_reference = initial_reference

      Run on update::

        profile = TrapezoidProfile(constraints, unprofiled_reference, previous_profiled_reference)
        previous_profiled_reference = profile.calculate(time_since_previous_update)

      where ``unprofiled_reference`` is free to change between calls. Note that
      when the unprofiled reference is within the constraints,
      :meth:`calculate` returns the unprofiled reference unchanged.

      Otherwise, a timer can be started to provide monotonic values for
      ``calculate()`` and to determine when the profile has completed via
      :meth:`is_finished`.
    methods:
      TrapezoidProfile:
        param_override:
          constraints:
            x_type: typename TrapezoidProfile<Distance>::Constraints
          goal:
            x_type: typename TrapezoidProfile<Distance>::State
          initial:
            x_type: typename TrapezoidProfile<Distance>::State
      Calculate:
      TimeLeftUntil:
      Duration:
      IsFinished:
    template_inline_code: |
      {
      std::string clsNameCopy = clsName;

      cls_TrapezoidProfile.attr("Constraints") = py::type::of<Constraints>();

      cls_State
        .def(
          py::init<Distance_t, Velocity_t>(),
          py::arg("position") = 0,
          py::arg("velocity") = 0
        )
        .def("__repr__", [clsNameCopy](const State &self) {
          return clsNameCopy + ".State("
            "position=" + std::to_string(self.position()) + ", "
            "velocity=" + std::to_string(self.velocity()) + ")";
        });
      }
  wpi::math::detail::TrapezoidProfileConstraints:
    template_params:
    - Distance
    attributes:
      maxVelocity:
      maxAcceleration:
    methods:
      TrapezoidProfileConstraints:
        overloads:
          '':
          Velocity_t, Acceleration_t:
            param_override:
              maxVelocity:
                default: '0'
              maxAcceleration:
                default: '0'
    template_inline_code: |
      cls_TrapezoidProfileConstraints
        .def("__repr__", [](const wpi::math::detail::TrapezoidProfileConstraints<Distance>& self) {
          return "TrapezoidProfile.Constraints("
            "max_velocity=" + std::to_string(self.maxVelocity()) + ", "
            "max_acceleration=" + std::to_string(self.maxAcceleration()) + ")";
        });
  wpi::math::TrapezoidProfile::State:
    force_no_default_constructor: true
    attributes:
      position:
      velocity:
    methods:
      operator==:
        cpp_code: py::self == State()
  wpi::math::TrapezoidProfile::ProfileTiming:
    attributes:
      t_1:
      t_2:
      t_3:
    methods:
      operator==:
templates:
  _TrapezoidProfileConstraints:
    qualname: wpi::math::detail::TrapezoidProfileConstraints
    params:
    - wpi::units::dimensionless::scalar

  _TrapezoidProfileRadiansConstraints:
    qualname: wpi::math::detail::TrapezoidProfileConstraints
    params:
    - wpi::units::radian

  TrapezoidProfile:
    qualname: wpi::math::TrapezoidProfile
    params:
    - wpi::units::dimensionless::scalar

  # needed for HolonomicDriveController
  TrapezoidProfileRadians:
    qualname: wpi::math::TrapezoidProfile
    params:
    - wpi::units::radian
