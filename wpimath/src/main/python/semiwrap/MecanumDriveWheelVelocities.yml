extra_includes:
- wpystruct.h

classes:
  wpi::math::MecanumDriveWheelVelocities:
    force_no_default_constructor: true
    attributes:
      frontLeft:
      frontRight:
      rearLeft:
      rearRight:
    methods:
      Desaturate:
      operator+:
      operator-:
        overloads:
          const MecanumDriveWheelVelocities& [const]:
          '[const]':
      operator*:
      operator/:

inline_code: |
  cls_MecanumDriveWheelVelocities
    .def(
      py::init<
        wpi::units::meters_per_second_t, wpi::units::meters_per_second_t,
        wpi::units::meters_per_second_t, wpi::units::meters_per_second_t
      >(),
      py::arg("front_left") = 0, py::arg("front_right") = 0,
      py::arg("rear_left") = 0, py::arg("rear_right") = 0
    )
    .def_static("from_feet", [](
        wpi::units::feet_per_second_t frontLeft,
        wpi::units::feet_per_second_t frontRight,
        wpi::units::feet_per_second_t rearLeft,
        wpi::units::feet_per_second_t rearRight
    ){
      return MecanumDriveWheelVelocities{frontLeft, frontRight, rearLeft, rearRight};
    }, py::arg("front_left"), py::arg("front_right"),
       py::arg("rear_left"), py::arg("rear_right"))
    .def_property("front_left_fps",
      [](MecanumDriveWheelVelocities * self) -> wpi::units::feet_per_second_t {
        return self->frontLeft;
      },
      [](MecanumDriveWheelVelocities * self, wpi::units::feet_per_second_t fps) {
        self->frontLeft = fps;
      }
    )
    .def_property("front_right_fps",
      [](MecanumDriveWheelVelocities * self) -> wpi::units::feet_per_second_t {
        return self->frontRight;
      },
      [](MecanumDriveWheelVelocities * self, wpi::units::feet_per_second_t fps) {
        self->frontRight = fps;
      }
    )
    .def_property("rear_left_fps",
      [](MecanumDriveWheelVelocities * self) -> wpi::units::feet_per_second_t {
        return self->rearLeft;
      },
      [](MecanumDriveWheelVelocities * self, wpi::units::feet_per_second_t fps) {
        self->rearLeft = fps;
      }
    )
    .def_property("rear_right_fps",
      [](MecanumDriveWheelVelocities * self) -> wpi::units::feet_per_second_t {
        return self->rearRight;
      },
      [](MecanumDriveWheelVelocities * self, wpi::units::feet_per_second_t fps) {
        self->rearRight = fps;
      }
    )
    .def("__repr__", [](const MecanumDriveWheelVelocities &ms) -> std::string {
      return "MecanumDriveWheelVelocities(front_left=" + std::to_string(ms.frontLeft()) + ", "
                                     "front_right=" + std::to_string(ms.frontRight()) + ", "
                                     "rear_left=" + std::to_string(ms.rearLeft()) + ", "
                                     "rear_right=" + std::to_string(ms.rearRight()) + ")";
    })
  ;

  SetupWPyStruct<wpi::math::MecanumDriveWheelVelocities>(cls_MecanumDriveWheelVelocities);
