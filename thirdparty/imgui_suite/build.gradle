if (project.hasProperty('onlylinuxsystemcore')) {
    return;
}

apply plugin: 'cpp'
apply plugin: 'visual-studio'
apply plugin: 'org.wpilib.NativeUtils'

apply from: "${rootDir}/shared/config.gradle"
apply from: "${rootDir}/shared/libsdlgpu.gradle"

model {
    components {
        imguiSuite(NativeLibrarySpec) {
            sources {
                cpp {
                    source {
                        srcDirs 'imgui/cpp', 'generated/fonts/src', 'stb/cpp', 'implot/cpp', 'imgui/cpp/misc/cpp'
                        include '*.cpp', 'backends/imgui_impl_sdl3.cpp', 'backends/imgui_impl_sdlgpu3.cpp', 'backends/imgui_impl_sdlrenderer3.cpp'
                    }
                    exportedHeaders {
                        srcDirs 'imgui/include', 'generated/fonts/include', 'stb/include', 'implot/include', 'imgui/include/misc/cpp', 'imgui/include/backends'
                        include '*.h', 'backends/imgui_impl_sdl3.h', 'backends/imgui_impl_sdlgpu3.h', 'backends/imgui_impl_sdlrenderer3.h'
                    }
                }
            }
            binaries.all {
                if (it.targetPlatform.name == nativeUtils.wpi.platforms.systemcore) {
                    it.buildable = false
                    return
                }
                if (toolChain in VisualCpp) {
                    cppCompiler.args '-D_UNICODE', '-DUNICODE', '-DWIN32', '-D_WIN32', '-DSTRICT', '-DWIN32_LEAN_AND_MEAN', '-D_HAS_EXCEPTIONS=1'
                } else {
                    cppCompiler.args '-Wshadow', '-fexceptions', '-Wno-missing-field-initializers'
                }
                project.addLibSdlGpuDependency(it)
                if (it in SharedLibraryBinarySpec && !it.targetPlatform.operatingSystem.isWindows()) {
                    it.linker.args << '-fvisibility=hidden'
                }
            }
            binaries.withType(SharedLibraryBinarySpec) {
                buildable = false
            }
            appendDebugPathToBinaries(binaries)
        }
    }
}

apply from: 'publish.gradle'
