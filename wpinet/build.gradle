import org.gradle.internal.os.OperatingSystem

def findWindowsCppWinrtIncludeDir = {
    def candidates = []
    def sdkDir = System.getenv('WindowsSdkDir')
    def sdkVersions = [
        System.getenv('WindowsSDKVersion'),
        System.getenv('WindowsTargetPlatformVersion'),
        System.getenv('WindowsSDKLibVersion')
    ].findAll { it != null && !it.isEmpty() }

    if (sdkDir != null && !sdkDir.isEmpty()) {
        sdkVersions.each {
            candidates << new File(new File(new File(sdkDir), 'Include'), it)
                    .toPath()
                    .normalize()
                    .toFile()
        }
    }

    def programFilesX86 = System.getenv('ProgramFiles(x86)')
    if (programFilesX86 != null && !programFilesX86.isEmpty()) {
        def includeRoot = new File(programFilesX86, 'Windows Kits/10/Include')
        if (includeRoot.isDirectory()) {
            def versionDirs = includeRoot.listFiles({ File file -> file.isDirectory() } as FileFilter)
            if (versionDirs != null) {
                versionDirs.sort { a, b -> b.name <=> a.name }.each {
                    candidates << it
                }
            }
        }
    }

    return candidates.collect {
        new File(it, 'cppwinrt')
    }.find {
        new File(it, 'winrt/base.h').isFile()
    }
}

if (OperatingSystem.current().isMacOsX()) {
    apply plugin: 'objective-cpp'
}

def addWpinetPlatformLinkerArgs = { binary ->
    if (binary.targetPlatform.operatingSystem.isWindows()) {
        binary.linker.args << 'windowsapp.lib'
    } else if (binary.targetPlatform.operatingSystem.isMacOsX()) {
        binary.linker.args << '-framework' << 'CoreBluetooth' << '-framework' << 'Foundation'
    } else {
        binary.linker.args << '-ldl'
    }
}

ext {
    baseId = 'wpinet'
    groupId = 'org.wpilib.net'

    nativeName = 'wpinet'
    devMain = 'org.wpilib.net.DevMain'
    nativeTestSuiteName = "${nativeName}Catch2Test"

    splitSetup = {
        it.sources {
            libuvCpp(CppSourceSet) {
                source {
                    srcDirs 'src/main/native/thirdparty/libuv/src'
                    include '*.cpp'
                }
                exportedHeaders {
                    srcDirs 'src/main/native/include', 'src/main/native/thirdparty/libuv/include', 'src/main/native/thirdparty/libuv/src'
                }
            }
            tcpsocketsCpp(CppSourceSet) {
                source {
                    srcDirs 'src/main/native/thirdparty/tcpsockets/cpp'
                    include '*.cpp'
                }
                exportedHeaders {
                    srcDirs 'src/main/native/include', 'src/main/native/thirdparty/tcpsockets/include'
                }
            }
        }
        if (!it.targetPlatform.operatingSystem.isWindows()) {
            it.cppCompiler.define '_GNU_SOURCE'
            it.sources {
                libuvUnixCpp(CppSourceSet) {
                    source {
                        srcDirs 'src/main/native/thirdparty/libuv/src/unix'
                        includes = [
                            'async.cpp',
                            'core.cpp',
                            'dl.cpp',
                            'fs.cpp',
                            'getaddrinfo.cpp',
                            'getnameinfo.cpp',
                            'loop-watcher.cpp',
                            'loop.cpp',
                            'pipe.cpp',
                            'poll.cpp',
                            'process.cpp',
                            'random-devurandom.cpp',
                            'random-getentropy.cpp',
                            'random-getrandom.cpp',
                            'signal.cpp',
                            'stream.cpp',
                            'tcp.cpp',
                            'thread.cpp',
                            'timer.cpp',
                            'tty.cpp',
                            'udp.cpp',
                        ]
                    }
                    exportedHeaders {
                        srcDirs 'src/main/native/include', 'src/main/native/thirdparty/libuv/include', 'src/main/native/thirdparty/libuv/src'
                    }
                }
                wpinetUnixCpp(CppSourceSet) {
                    source {
                        srcDirs 'src/main/native/unix'
                        include '**/*.cpp'
                    }
                    exportedHeaders {
                        srcDirs 'src/main/native/include', 'src/main/native/cpp', 'src/main/native/thirdparty/libuv/include', 'src/main/native/thirdparty/libuv/src'
                        include '**/*.h'
                    }
                }
            }
        }
        if (it.targetPlatform.operatingSystem.isWindows()) {
            def cppWinrtIncludeDir = findWindowsCppWinrtIncludeDir()
            if (cppWinrtIncludeDir != null) {
                it.cppCompiler.args << "/I${cppWinrtIncludeDir.absolutePath}"
            }
            if (it in SharedLibraryBinarySpec) {
                it.cppCompiler.define 'BUILDING_UV_SHARED'
            }
            it.sources {
                libuvWindowsCpp(CppSourceSet) {
                    source {
                        srcDirs 'src/main/native/thirdparty/libuv/src/win'
                        include '*.cpp'
                    }
                    exportedHeaders {
                        srcDirs 'src/main/native/include', 'src/main/native/thirdparty/libuv/include', 'src/main/native/thirdparty/libuv/src'
                    }
                }
                wpinetWindowsCpp(CppSourceSet) {
                    source {
                        srcDirs 'src/main/native/windows'
                        include '**/*.cpp'
                    }
                    exportedHeaders {
                        srcDirs 'src/main/native/include', 'src/main/native/cpp', 'src/main/native/thirdparty/libuv/include', 'src/main/native/thirdparty/libuv/src'
                        include '**/*.h'
                    }
                }
            }
        } else if (it.targetPlatform.operatingSystem.isMacOsX()) {
            it.sources {
                libuvMacCpp(CppSourceSet) {
                    source {
                        srcDirs 'src/main/native/thirdparty/libuv/src/unix'
                        includes = [
                            'bsd-ifaddrs.cpp',
                            'darwin.cpp',
                            'darwin-proctitle.cpp',
                            'fsevents.cpp',
                            'kqueue.cpp',
                            'proctitle.cpp'
                        ]
                    }
                    exportedHeaders {
                        srcDirs 'src/main/native/include', 'src/main/native/thirdparty/libuv/include', 'src/main/native/thirdparty/libuv/src'
                    }
                }
                wpinetmacOSCpp(CppSourceSet) {
                    source {
                        srcDirs 'src/main/native/macOS'
                        include '**/*.cpp'
                    }
                    exportedHeaders {
                        srcDirs 'src/main/native/include', 'src/main/native/cpp', 'src/main/native/thirdparty/libuv/include', 'src/main/native/thirdparty/libuv/src'
                        include '**/*.h'
                    }
                }
                wpinetmacOSObjectiveCpp(ObjectiveCppSourceSet) {
                    source {
                        srcDirs 'src/main/native/macOS'
                        include '**/*.mm'
                    }
                    exportedHeaders {
                        srcDirs 'src/main/native/include', 'src/main/native/cpp', 'src/main/native/thirdparty/libuv/include', 'src/main/native/thirdparty/libuv/src'
                        include '**/*.h'
                    }
                }
            }
        } else {
            it.sources {
                libuvLinuxCpp(CppSourceSet) {
                    source {
                        srcDirs 'src/main/native/thirdparty/libuv/src/unix'
                        includes = [
                            'linux.cpp',
                            'procfs-exepath.cpp',
                            'proctitle.cpp',
                            'random-sysctl-linux.cpp',
                        ]
                    }
                    exportedHeaders {
                        srcDirs 'src/main/native/include', 'src/main/native/thirdparty/libuv/include', 'src/main/native/thirdparty/libuv/src'
                    }
                }
                wpinetLinuxCpp(CppSourceSet) {
                    source {
                        srcDirs 'src/main/native/linux'
                        include '**/*.cpp'
                    }
                    exportedHeaders {
                        srcDirs 'src/main/native/include', 'src/main/native/cpp', 'src/main/native/thirdparty/libuv/include', 'src/main/native/thirdparty/libuv/src'
                        include '**/*.h'
                    }
                }
            }
        }
        addWpinetPlatformLinkerArgs(it)
    }
}

def examplesMap = [:];
file("$projectDir/examples").list(new FilenameFilter() {
            @Override
            public boolean accept(File current, String name) {
                return new File(current, name).isDirectory();
            }
        }).each {
            examplesMap.put(it, [])
        }

apply from: "${rootDir}/shared/jni/setupBuild.gradle"

nativeUtils.exportsConfigs {
    wpinet {
    }
}

cppHeadersZip {
    from('src/main/native/thirdparty/libuv/include') {
        into '/'
    }
    from('src/main/native/thirdparty/tcpsockets/include') {
        into '/'
    }
}

cppSourcesZip {
    from('src/main/native/thirdparty/tcpsockets/cpp') {
        into '/'
    }
}

model {
    components {
        all {
            it.sources.each {
                it.exportedHeaders {
                    srcDirs 'src/main/native/include', 'src/main/native/thirdparty/libuv/include', 'src/main/native/thirdparty/tcpsockets/include', 'src/main/native/thirdparty/libuv/src'
                }
            }
        }
    }
}

model {
    binaries {
        all {
            if (it.component.name == nativeName) {
                addWpinetPlatformLinkerArgs(it)
            }
        }
    }
}

model {
    components {
        examplesMap.each { key, value ->
            "${key}"(NativeExecutableSpec) {
                targetBuildTypes 'debug'
                binaries.all {
                    lib library: 'wpinet', linkage: 'shared'
                    lib project: ':wpiutil', library: 'wpiutil', linkage: 'shared'
                }
                sources {
                    cpp {
                        source {
                            srcDirs 'examples/' + "${key}"
                            include '**/*.cpp'
                        }
                    }
                }
            }
        }
        netconsoleServer(NativeExecutableSpec) {
            sources {
                cpp {
                    source {
                        srcDirs = [
                            'src/netconsoleServer/native/cpp'
                        ]
                        includes = ['**/*.cpp']
                    }
                }
            }
            binaries.all { binary ->
                lib project: ':wpinet', library: 'wpinet', linkage: 'static'
                lib project: ':wpiutil', library: 'wpiutil', linkage: 'static'
                if (binary.targetPlatform.operatingSystem.isLinux()) {
                    linker.args "-lutil"
                }
            }
        }
        netconsoleTee(NativeExecutableSpec) {
            sources {
                cpp {
                    source {
                        srcDirs = [
                            'src/netconsoleTee/native/cpp'
                        ]
                        includes = ['**/*.cpp']
                    }
                }
            }
            binaries.all { binary ->
                lib project: ':wpinet', library: 'wpinet', linkage: 'static'
                lib project: ':wpiutil', library: 'wpiutil', linkage: 'static'
            }
        }
    }
}
