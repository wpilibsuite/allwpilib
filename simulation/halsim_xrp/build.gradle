if (project.hasProperty('onlylinuxsystemcore')) {
    return;
}

description = "XRP Extension"

ext {
    includeWpiutil = true
    pluginName = 'halsim_xrp'
}

apply from: "${rootDir}/shared/plugins/setupBuild.gradle"

model {
    binaries {
        all {
            if (it.targetPlatform.name == nativeUtils.wpi.platforms.systemcore) {
                it.buildable = false
                return
            }

            project(':ntcore').addNtcoreDependency(it, 'shared')
            lib project: ':wpinet', library: 'wpinet', linkage: 'shared'
            lib project: ':wpiutil', library: 'wpiutil', linkage: 'shared'
            lib project: ':wpigui', library: 'wpigui', linkage: 'static'
            lib project: ":simulation:halsim_ws_core", library: "halsim_ws_core", linkage: "static"
            lib project: ':thirdparty:imgui_suite', library: 'imguiSuite', linkage: 'static'
            if (it.targetPlatform.operatingSystem.isWindows()) {
                it.linker.args << 'Gdi32.lib' << 'Shell32.lib' << 'd3d11.lib' << 'd3dcompiler.lib'
            } else if (it.targetPlatform.operatingSystem.isMacOsX()) {
                it.linker.args << '-framework' << 'Metal' << '-framework' << 'MetalKit' << '-framework' << 'Cocoa' << '-framework' << 'IOKit' << '-framework' << 'CoreFoundation' << '-framework' << 'CoreVideo' << '-framework' << 'QuartzCore'
            } else {
                it.linker.args << '-lX11'
                if (it.targetPlatform.name.startsWith('linuxarm')) {
                    it.linker.args << '-lGL'
                }
            }
        }
    }
}
