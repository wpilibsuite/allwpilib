[build-system]
build-backend = "hatchling.build"
requires = [
    "semiwrap~=0.6.0",
    "hatch-meson~=0.1.2",
    "hatch-robotpy~=0.2.1",
    "hatchling",
    "robotpy-wpiutil==0.0.0",
    "robotpy-wpimath==0.0.0",
    "robotpy-hal==0.0.0",
    "pyntcore==0.0.0",
    "robotpy-native-halsim-gui==0.0.0",
]

[project]
name = "robotpy-halsim-gui"
version = "0.0.0"
description = "WPILib simulation GUI"
requires-python = ">=3.11"
authors = [
    {name = "RobotPy Development Team", email = "robotpy@googlegroups.com"},
]
license = "BSD-3-Clause"
dependencies = [
    "robotpy-wpiutil==0.0.0",
    "robotpy-wpimath==0.0.0",
    "robotpy-hal==0.0.0",
    "pyntcore==0.0.0",
    "robotpy-native-halsim-gui==0.0.0",
]

[project.urls]
"Source code" = "https://github.com/robotpy/mostrobotpy"


[tool.hatch.build.hooks.robotpy]
version_file = "halsim_gui/version.py"

[tool.hatch.build.hooks.semiwrap]

[tool.hatch.build.hooks.meson]

[tool.hatch.build.targets.wheel]
packages = ["halsim_gui"]

[tool.semiwrap]
scan_headers_ignore = [
    "wpi/halsim/gui/*",
]

[tool.semiwrap.name_transform]
default = "snake_case"
enum_value = "CAPS_CASE"
known_words = ["3V3", "5V", "CAN", "CPU", "DS", "FMS", "FPGA", "HAL", "HTTP", "I2C", "IMU", "JNI", "JSON", "mDNS", "NT", "OpMode", "PCM", "PDH", "PDP", "PID", "POVs", "PWM", "RIO", "SPI", "URI", "URL", "USB", "VIn"]

[tool.semiwrap.extension_modules."halsim_gui._ext._halsim_gui_ext"]
name = "halsim_gui_ext"
wraps = ["robotpy-native-halsim-gui"]
depends = ["wpihal", "wpimath", "ntcore"]
