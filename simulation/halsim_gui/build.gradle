if (project.hasProperty('onlylinuxsystemcore')) {
    return;
}

description = "A plugin that creates a simulation gui"

ext {
    pluginName = 'halsim_gui'
}

apply plugin: 'google-test-test-suite'

apply from: "${rootDir}/shared/catch2.gradle"

apply from: "${rootDir}/shared/plugins/setupBuild.gradle"
apply from: "${rootDir}/shared/libsdlgpu.gradle"

model {
    testSuites {
        "${pluginName}Catch2Test"(GoogleTestTestSuiteSpec) {
            for(NativeComponentSpec c : $.components) {
                if (c.name == pluginName) {
                    testing c
                    break
                }
            }
            sources.cpp {
                source {
                    srcDirs 'src/test/native/cpp'
                    include '**/*.cpp'
                }
                exportedHeaders {
                    srcDirs 'src/test/native/include', 'src/main/native/cpp'
                }
            }
            binaries.all {
                lib project: ':thirdparty:catch2', library: 'catch2', linkage: 'static'
            }
        }
    }
}

model {
    binaries {
        all {
            lib project: ':glass', library: 'glassnt', linkage: 'static'
            lib project: ':glass', library: 'glass', linkage: 'static'
            lib project: ':wpigui', library: 'wpigui', linkage: 'static'
            lib project: ':wpimath', library: 'wpimath', linkage: 'shared'
            project(':hal').addHalDependency(it, 'shared')
            project(':ntcore').addNtcoreDependency(it, 'shared')
            lib project: ':wpinet', library: 'wpinet', linkage: 'shared'
            lib project: ':wpiutil', library: 'wpiutil', linkage: 'shared'
            lib project: ':fields', library: 'fields', linkage: 'static'
            lib project: ':thirdparty:imgui_suite', library: 'imguiSuite', linkage: 'static'
            project.addLibSdlGpuDependency(it)
            if (it.targetPlatform.name == nativeUtils.wpi.platforms.systemcore) {
                it.buildable = false
                return
            }
        }
        withType(GoogleTestTestSuiteBinarySpec) {
            project(':hal').addHalDependency(it, 'shared')
            project(':ntcore').addNtcoreDependency(it, 'shared')
            lib project: ':wpinet', library: 'wpinet', linkage: 'shared'
            lib project: ':wpiutil', library: 'wpiutil', linkage: 'shared'
            lib library: pluginName, linkage: 'shared'
        }
    }
}
