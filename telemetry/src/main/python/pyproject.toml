[build-system]
build-backend = "hatchling.build"
requires = [
    "semiwrap~=0.6.0",
    "hatch-meson~=0.1.2",
    "hatch-robotpy~=0.2.1",
    "hatchling",
    "robotpy-native-telemetry==0.0.0",
    "robotpy-wpiutil==0.0.0",
]

[project]
name = "robotpy-telemetry"
version = "0.0.0"
description = "Binary wrapper for WPILib telemetry library"
requires-python = ">=3.11"
authors = [
    {name = "RobotPy Development Team", email = "robotpy@googlegroups.com"},
]
license = "BSD-3-Clause"
dependencies = [
    "robotpy-native-telemetry==0.0.0",
    "robotpy-wpiutil==0.0.0",
]

[project.urls]
"Source code" = "https://github.com/robotpy/mostrobotpy"

[tool.hatch.build.hooks.robotpy]
version_file = "telemetry/version.py"

[tool.hatch.build.hooks.semiwrap]

[tool.hatch.build.hooks.meson]

[tool.hatch.build.targets.wheel]
packages = ["telemetry"]

[tool.semiwrap]
update_init = [
    "telemetry"
]
scan_headers_ignore = [
    "src/TelemetryPython.h",
    "wpi/telemetry/DiscardTelemetryBackend.hpp",
    "wpi/telemetry/MockTelemetryBackend.hpp",
    "wpi/telemetry/Telemetry.hpp",
    "wpi/telemetry/TelemetryLoggable.hpp",
    "wpi/telemetry/TelemetryRegistry.hpp",
    "wpi/telemetry/TelemetryTable.hpp",
]

[tool.semiwrap.name_transform]
default = "snake_case"
enum_value = "CAPS_CASE"
known_words = ["3V3", "5V", "CAN", "CPU", "DS", "FMS", "FPGA", "HAL", "HTTP", "I2C", "IMU", "JNI", "JSON", "mDNS", "NT", "OpMode", "PCM", "PDH", "PDP", "PID", "POVs", "PWM", "RIO", "SPI", "URI", "URL", "USB", "VIn"]

[tool.semiwrap.extension_modules."telemetry._telemetry"]
name = "telemetry"
wraps = ["robotpy-native-telemetry"]
depends = ["wpiutil"]

[tool.semiwrap.extension_modules."telemetry._telemetry".headers]
TelemetryEntry = "wpi/telemetry/TelemetryEntry.hpp"
TelemetryBackend = "wpi/telemetry/TelemetryBackend.hpp"
