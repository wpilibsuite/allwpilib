[build-system]
build-backend = "hatchling.build"
requires = [
    "hatchling",
    "hatch-nativelib~=0.2.0",
    "hatch-robotpy~=0.2.1",
    "robotpy-native-wpiutil==0.0.0",
]

[project]
name = "robotpy-native-telemetry"
version = "0.0.0"
description = "WPILib Telemetry Library"
license = "BSD-3-Clause"

dependencies = [
    "robotpy-native-wpiutil==0.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/native"]

[[tool.hatch.build.hooks.robotpy.maven_lib_download]]
artifact_id = "telemetry-cpp"
group_id = "org.wpilib.telemetry"
repo_url = ""
version = "0.0.0"

extract_to = "src/native/telemetry"
libs = ["telemetry"]

[[tool.hatch.build.hooks.nativelib.pcfile]]
pcfile = "src/native/telemetry/robotpy-native-telemetry.pc"
name = "telemetry"

includedir = "src/native/telemetry/include"
libdir = "src/native/telemetry/lib"
shared_libraries = ["telemetry"]
requires = ["robotpy-native-wpiutil"]
