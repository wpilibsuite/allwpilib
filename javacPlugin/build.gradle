ext {
    useJava = true
    useCpp = false
    baseId = 'wpilibj-javac-plugin'
    groupId = 'org.wpilib'

    nativeName = ''
    devMain = ''
}

apply from: "${rootDir}/shared/java/javacommon.gradle"

dependencies {
    implementation project(':wpiannotations')
    testImplementation libs.compile.testing
    testImplementation project(':commandsv2')
}

test {
    moduleOptions {
        runOnClasspath = true
    }
}

afterEvaluate {
    tasks.withType(JavaCompile).matching { it.name.contains("Test") }.configureEach {
        options.compilerArgs << "--add-modules" << "com.google.common" << "--add-reads" << "wpilib.javac=com.google.common"
    }
}
