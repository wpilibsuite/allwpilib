syntax = "proto3";

package wpi.proto;

import "wpimath/src/main/proto/geometry3d.proto";

option java_package = "org.wpilib.vision.apriltag.proto";

option java_outer_classname = "ProtobufAprilTagDescriptor";

option java_multiple_files = true;

message ProtobufAprilTag {
  uint32 id = 1;
  ProtobufPose3d pose = 2;
}

message ProtobufAprilTagFieldLayout {
  message ProtobufFieldDimensions {
    double length = 1;
    double width = 2;
  }

  repeated ProtobufAprilTag tags = 1;
  ProtobufFieldDimensions field = 2;
}
