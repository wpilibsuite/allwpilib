if (project.hasProperty('onlylinuxsystemcore')) {
    return;
}

apply plugin: 'cpp'
apply plugin: 'c'
apply plugin: 'google-test-test-suite'
apply plugin: 'visual-studio'
apply plugin: 'org.wpilib.NativeUtils'
apply plugin: 'org.wpilib.GradleJni'
apply plugin: SingleNativeBuild
apply plugin: ExtraTasks

ext {
    nativeName = "mrcal"
    baseId = nativeName
    groupId = "org.wpilib.${nativeName}"
    devMain = "${groupId}.DevMain"
}

apply from: "${rootDir}/shared/config.gradle"

apply from: "${rootDir}/shared/java/javacommon.gradle"

dependencies {
    implementation libs.thirdparty.opencv
    if (!project.hasProperty('skipDev') || !project.skipDev) {
        devImplementation libs.thirdparty.opencv
    }
    if (project.hasProperty('useDocumentation') && project.useDocumentation) {
        javaSource(variantOf(libs.thirdparty.opencv) { classifier("sources") })
    }
    if (!project.hasProperty('noWpiutil')) {
        implementation project(':wpiutil')
        devImplementation project(':wpiutil')
    }
    implementation project(':wpimath')
}

project(':').libraryBuild.dependsOn build

ext {
    staticGtestConfigs = [:]
}

staticGtestConfigs["${nativeName}Test"] = []

apply from: "${rootDir}/shared/googletest.gradle"
apply from: "${rootDir}/shared/catch2.gradle"
apply from: "${rootDir}/shared/ceres.gradle"
apply from: "${rootDir}/shared/opencv.gradle"


// Suppress warnings
nativeUtils.platformConfigs.each {
    if (it.name.contains('windows')) {
        it.cCompiler.args.add("/wd4047")
        it.cCompiler.args.add("/wd4098")
        it.cCompiler.args.add("/wd4267")
        it.cppCompiler.args.add("/wd4068")
        it.cppCompiler.args.add("/wd4101")
        it.cppCompiler.args.add("/wd4200")
        it.cppCompiler.args.add("/wd4576")
        it.cppCompiler.args.add("/wd4715")
    } else if (it.name.contains('osx')) {
        it.cCompiler.args.add("-Wno-format-nonliteral")
        it.cCompiler.args.remove("-pedantic")
        it.cCompiler.args.add("-Wno-unused-variable")
        it.cCompiler.args.add("-Wno-unused-function")
        it.cCompiler.args.add("-Wno-sign-compare")
        it.cppCompiler.args.add("-Wno-missing-field-initializers")
        it.cppCompiler.args.remove("-pedantic")
        it.cppCompiler.args.add("-Wno-unused-variable")
        it.cppCompiler.args.add("-Wno-unused-function")
        it.cppCompiler.args.add("-Wno-sign-compare")
        it.cppCompiler.args.remove("-permissive")
        it.cppCompiler.args.add("-fpermissive")
        it.cppCompiler.args.add("-Wno-missing-braces")
        it.cppCompiler.args.add("-Wno-null-conversion")
        it.cppCompiler.args.add("-Wno-unused-but-set-variable")
    } else {
        it.cCompiler.args.add("-Wno-format-nonliteral")
        it.cCompiler.args.remove("-pedantic")
        it.cCompiler.args.add("-Wno-unused-variable")
        it.cCompiler.args.add("-Wno-unused-function")
        it.cCompiler.args.add("-Wno-sign-compare")
        it.cppCompiler.args.add("-Wno-missing-field-initializers")
        it.cppCompiler.args.remove("-pedantic")
        it.cppCompiler.args.add("-Wno-unused-variable")
        it.cppCompiler.args.add("-Wno-unused-function")
        it.cppCompiler.args.add("-Wno-sign-compare")
        it.cppCompiler.args.add("-Wno-deprecated-declarations")
        it.cppCompiler.args.add("-Wno-deprecated-enum-enum-conversion")
        it.cppCompiler.args.remove("-permissive")
        it.cppCompiler.args.add("-fpermissive")
    }
}

model {
    components {
        "${nativeName}Base"(NativeLibrarySpec) {
            if (project.hasProperty('setBaseName')) {
                baseName = setBaseName
            }
            sources {
                c {
                    source {
                        srcDirs 'src/main/native/thirdparty/src'
                        include '*.c'
                    }
                    exportedHeaders {
                        srcDirs 'src/main/native/include', "$buildDir/generated/source/proto/main/cpp", 'src/main/native/thirdparty/generated', 'src/main/native/thirdparty/include', 'src/main/native/thirdparty/libdogleg/include'
                        include '**/*.h'
                    }
                }
                cpp {
                    source {
                        srcDirs 'src/main/native/cpp', "$buildDir/generated/source/proto/main/cpp", 'src/main/native/thirdparty/src', 'src/main/native/thirdparty/libdogleg/src'
                        if (project.hasProperty('generatedSources')) {
                            srcDir generatedSources
                        }
                        include '**/*.cpp'
                        exclude '**/jni/**/*.cpp'
                    }
                    exportedHeaders {
                        srcDirs 'src/main/native/include', "$buildDir/generated/source/proto/main/cpp", 'src/main/native/thirdparty/generated', 'src/main/native/thirdparty/include', 'src/main/native/thirdparty/libdogleg/include'

                        if (project.hasProperty('generatedHeaders')) {
                            srcDir generatedHeaders
                        }
                        include '**/*.hpp', '**/*.h',  '**/*.hh'
                    }
                }
            }
            binaries.all {
                if (it.targetPlatform.name == nativeUtils.wpi.platforms.systemcore) {
                    it.buildable = false
                    return
                }

                if (it instanceof SharedLibraryBinarySpec) {
                    it.buildable = false
                    return
                }
                it.cppCompiler.define 'WPILIB_EXPORTS', 'SLEIPNIR_EXPORTS'
                it.cCompiler.define 'WPILIB_EXPORTS', 'SLEIPNIR_EXPORTS'
                if (!project.hasProperty('noWpiutil')) {
                    lib project: ':wpiutil', library: 'wpiutil', linkage: 'shared'
                }
                lib project: ':wpimath', library: 'wpimath', linkage: 'shared'
                if (project.hasProperty('splitSetup')) {
                    splitSetup(it)
                }
                if (it in SharedLibraryBinarySpec) {
                    nativeUtils.useRequiredLibrary(it, 'opencv_shared')
                } else {
                    nativeUtils.useRequiredLibrary(it, 'opencv_static')
                }
                nativeUtils.useRequiredLibrary(it, 'ceres')

                if (it.targetPlatform.operatingSystem.isMacOsX()) {
                    it.linker.args  << '-framework' << 'Accelerate'
                }
            }
        }
        "${nativeName}"(NativeLibrarySpec) {
            if (project.hasProperty('setBaseName')) {
                baseName = setBaseName
            }
            sources {
                cpp {
                    source {
                        srcDirs "${rootDir}/shared/singlelib"
                        include '**/*.cpp'
                    }
                    exportedHeaders {
                        srcDirs 'src/main/native/include', "$buildDir/generated/source/proto/main/cpp", 'src/main/native/thirdparty/generated', 'src/main/native/thirdparty/include', 'src/main/native/thirdparty/libdogleg/include'
                        if (project.hasProperty('generatedHeaders')) {
                            srcDir generatedHeaders
                        }
                        include '**/*.hpp', '**/*.h',  '**/*.hh'
                    }
                }
            }
            binaries.all {
                if (it.targetPlatform.name == nativeUtils.wpi.platforms.systemcore) {
                    it.buildable = false
                    return
                }
                if (!project.hasProperty('noWpiutil')) {
                    lib project: ':wpiutil', library: 'wpiutil', linkage: 'shared'
                }
                lib project: ':wpimath', library: 'wpimath', linkage: 'shared'
                if (it in SharedLibraryBinarySpec) {
                    nativeUtils.useRequiredLibrary(it, 'opencv_shared')
                } else {
                    nativeUtils.useRequiredLibrary(it, 'opencv_static')
                }
                nativeUtils.useRequiredLibrary(it, 'ceres')
            }
            appendDebugPathToBinaries(binaries)
        }
        "${nativeName}JNIShared"(JniNativeLibrarySpec) {
            if (project.hasProperty('setBaseName')) {
                baseName = setBaseName + 'jni'
            } else {
                baseName = nativeName + 'jni'
            }

            if (project.hasProperty('skipJniSymbols')) {
                checkSkipSymbols = skipJniSymbols
            }

            enableCheckTask !project.hasProperty('skipJniCheck')
            javaCompileTasks << compileJava
            jniCrossCompileOptions << JniCrossCompileOptions(nativeUtils.wpi.platforms.linuxarm64)
            sources {
                cpp {
                    source {
                        srcDirs 'src/main/native/cpp'
                        if (project.hasProperty('generatedSources')) {
                            srcDir generatedSources
                        }
                        include '**/jni/**/*.cpp'
                    }
                    exportedHeaders {
                        srcDirs 'src/main/native/include', "$buildDir/generated/source/proto/main/cpp", 'src/main/native/thirdparty/generated', 'src/main/native/thirdparty/include', 'src/main/native/thirdparty/libdogleg/include'
                        if (project.hasProperty('generatedHeaders')) {
                            srcDir generatedHeaders
                        }
                        include '**/*.h', '**/*.hh', '**/*.hpp'
                    }
                }
            }
            binaries.all {
                if (it.targetPlatform.name == nativeUtils.wpi.platforms.systemcore) {
                    it.buildable = false
                    return
                }
                if (it instanceof StaticLibraryBinarySpec) {
                    it.buildable = false
                    return
                }
                lib library: "${nativeName}", linkage: 'shared'
                lib project: ':wpimath', library: 'wpimath', linkage: 'shared'
                if (!project.hasProperty('noWpiutil')) {
                    lib project: ':wpiutil', library: 'wpiutil', linkage: 'shared'
                }
                if (project.hasProperty('jniSplitSetup')) {
                    jniSplitSetup(it)
                }
                if (it in SharedLibraryBinarySpec) {
                    nativeUtils.useRequiredLibrary(it, 'opencv_shared')
                } else {
                    nativeUtils.useRequiredLibrary(it, 'opencv_static')
                }
                nativeUtils.useRequiredLibrary(it, 'ceres')
            }
        }
        // By default, a development executable will be generated. This is to help the case of
        // testing specific functionality of the library.
        "${nativeName}Dev"(NativeExecutableSpec) {
            if (project.hasProperty('ciDebugOnly') || project.hasProperty('debugJNI')) {
                targetBuildTypes 'debug'
            } else {
                targetBuildTypes 'release'
            }
            sources {
                cpp {
                    source {
                        srcDirs 'src/dev/native/cpp'
                        include '**/*.cpp'
                    }
                    exportedHeaders {
                        srcDirs 'src/main/native/include', "$buildDir/generated/source/proto/main/cpp", 'src/main/native/thirdparty/generated', 'src/main/native/thirdparty/include', 'src/main/native/thirdparty/libdogleg/include'
                        if (project.hasProperty('generatedHeaders')) {
                            srcDir generatedHeaders
                        }
                    }
                }
            }
            binaries.all {
                if (it.targetPlatform.name == nativeUtils.wpi.platforms.systemcore) {
                    it.buildable = false
                    return
                }
                lib library: "${nativeName}", linkage: 'shared'
                lib library: "${nativeName}JNIShared", linkage: 'shared'
                lib project: ':wpimath', library: 'wpimath', linkage: 'shared'
                if (!project.hasProperty('noWpiutil')) {
                    lib project: ':wpiutil', library: 'wpiutil', linkage: 'shared'
                    lib project: ':wpiutil', library: 'wpiutilJNIShared', linkage: 'shared'
                }
                if (project.hasProperty('exeSplitSetup')) {
                    exeSplitSetup(it)
                }
            }
        }
        "${nativeName}TestLib"(NativeLibrarySpec) {
            sources {
                cpp {
                    source {
                        srcDirs 'src/testlib/native/cpp'
                        include '**/*.cpp'
                    }
                    exportedHeaders {
                        srcDirs 'src/main/native/include', "$buildDir/generated/source/proto/main/cpp", 'src/main/native/thirdparty/generated', 'src/main/native/thirdparty/include', 'src/main/native/thirdparty/libdogleg/include'
                    }
                }
                binaries.all {
                    if (it.targetPlatform.name == nativeUtils.wpi.platforms.systemcore) {
                        it.buildable = false
                        return
                    }
                    lib project: ':wpiutil', library: 'wpiutil', linkage: 'shared'
                    lib project: ':wpimath', library: 'wpimath', linkage: 'shared'
                    if (it in SharedLibraryBinarySpec) {
                        nativeUtils.useRequiredLibrary(it, 'opencv_shared')
                    } else {
                        nativeUtils.useRequiredLibrary(it, 'opencv_static')
                    }
                    nativeUtils.useRequiredLibrary(it, 'ceres')
                    lib library: "${nativeName}", linkage: 'shared'
                }
            }
        }
    }
    testSuites {
        "${nativeName}Test"(GoogleTestTestSuiteSpec) {
            for(NativeComponentSpec c : $.components) {
                if (c.name == nativeName) {
                    testing c
                    break
                }
            }
            sources {
                cpp {
                    source {
                        srcDirs 'src/test/native/cpp'
                        include '**/*.cpp'
                        exclude '**/TestCatch2.cpp', '**/catch2main.cpp'
                    }
                    exportedHeaders {
                        srcDirs 'src/main/native/include', "$buildDir/generated/source/proto/main/cpp", 'src/main/native/thirdparty/generated', 'src/main/native/thirdparty/include', 'src/main/native/thirdparty/libdogleg/include'
                        if (project.hasProperty('generatedHeaders')) {
                            srcDir generatedHeaders
                        }
                    }
                }
                binaries.all {
                    if (it.targetPlatform.name == nativeUtils.wpi.platforms.systemcore) {
                        it.buildable = false
                        return
                    }
                    lib project: ':wpiutil', library: 'wpiutil', linkage: 'shared'
                    lib project: ':wpimath', library: 'wpimath', linkage: 'shared'
                    nativeUtils.useRequiredLibrary(it, 'opencv_shared')
                    nativeUtils.useRequiredLibrary(it, 'ceres')
                    lib library: "${nativeName}", linkage: 'shared'
                }
            }
        }
    }
    binaries {
        withType(GoogleTestTestSuiteBinarySpec) {
            if (!project.hasProperty('noWpiutil')) {
                lib project: ':wpiutil', library: 'wpiutil', linkage: 'shared'
                lib project: ':wpiutil', library: 'wpiutilTestLib', linkage: 'shared'
            }
            if (project.hasProperty('exeSplitSetup')) {
                exeSplitSetup(it)
            }
            if (it.targetPlatform.name == nativeUtils.wpi.platforms.systemcore) {
                it.buildable = false
                return
            }
            lib project: ':wpiutil', library: 'wpiutil', linkage: 'shared'
            lib project: ':wpimath', library: 'wpimath', linkage: 'shared'
            if (it in SharedLibraryBinarySpec) {
                nativeUtils.useRequiredLibrary(it, 'opencv_shared')
            } else {
                nativeUtils.useRequiredLibrary(it, 'opencv_static')
            }
            nativeUtils.useRequiredLibrary(it, 'ceres')
            lib library: "${nativeName}", linkage: 'shared'
        }
    }
    tasks {
        def c = $.components
        project.tasks.create('runCpp', Exec) {
            group = 'WPILib'
            description = "Run the ${nativeName}Dev executable"
            def found = false
            def systemArch = getCurrentArch()
            c.each {
                if (it in NativeExecutableSpec && it.name == "${nativeName}Dev") {
                    it.binaries.each {
                        if (!found) {
                            def arch = it.targetPlatform.name
                            if (arch == systemArch) {
                                dependsOn it.tasks.install
                                commandLine it.tasks.install.runScriptFile.get().asFile.toString()
                                def filePath = it.tasks.install.installDirectory.get().toString() + File.separatorChar + 'lib'
                                test.dependsOn it.tasks.install

                                if (project.hasProperty('buildServer')) {
                                    def folderDir = it.tasks.install.installDirectory.get().toString()
                                    test.doLast {
                                        def folder = file(folderDir)
                                        folder.deleteDir()
                                    }
                                }

                                test.systemProperty 'java.library.path', filePath
                                run.dependsOn it.tasks.install
                                run.systemProperty 'java.library.path', filePath

                                found = true
                            }
                        }
                    }
                }
            }
        }
    }
}

apply from: "${rootDir}/shared/cppJavaDesktopTestTask.gradle"

ext.getJniSpecClass = {
    return JniNativeLibrarySpec
}

apply from: "${rootDir}/shared/jni/publish.gradle"
