apply plugin: 'maven-publish'

def baseArtifactId = 'mrcal'
def artifactGroupId = 'edu.wpi.first.thirdparty.mrcal'
def zipBaseName = '_GROUP_edu_wpi_first_thirdparty_mrcal_ID_mrcal-cpp_CLS'

def outputsFolder = file("$project.buildDir/outputs")

addTaskToCopyAllOutputs(cppHeadersZip)
addTaskToCopyAllOutputs(cppSourcesZip)

model {
    publishing {
        def mrcalTaskList = createComponentZipTasks($.components, ['mrcal'], zipBaseName, Zip, project, includeStandardZipFormat)

        publications {
            cpp(MavenPublication) {
                mrcalTaskList.each {
                    artifact it
                }

                artifact cppHeadersZip
                artifact cppSourcesZip

                artifactId = baseArtifactId
                groupId = artifactGroupId
                version = wpilibVersioning.version.get()
            }
        }
    }
}
