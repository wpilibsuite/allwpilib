if (project.hasProperty('onlylinuxsystemcore')) {
    return;
}

apply plugin: 'cpp'
apply plugin: 'visual-studio'
apply plugin: 'org.wpilib.NativeUtils'

ext {
    nativeName = 'wpigui'
}

apply from: "${rootDir}/shared/config.gradle"
apply from: "${rootDir}/shared/libsdlgpu.gradle"

nativeUtils.exportsConfigs {
    wpigui {
    }
}

model {
    components {
        "${nativeName}"(NativeLibrarySpec) {
            sources.cpp {
                source {
                    srcDirs "src/main/native/cpp"
                    include '*.cpp'
                }
                exportedHeaders {
                    srcDirs 'src/main/native/include'
                }
            }
            binaries.all {
                lib project: ':thirdparty:imgui_suite', library: 'imguiSuite', linkage: 'static'
                if (it.targetPlatform.name == nativeUtils.wpi.platforms.systemcore) {
                    it.buildable = false
                    return
                }
                project.addLibSdlGpuDependency(it)
                it.sources.each {
                    it.exportedHeaders {
                        srcDirs 'src/main/native/include'
                    }
                }
            }
        }
        // By default, a development executable will be generated. This is to help the case of
        // testing specific functionality of the library.
        "${nativeName}Dev"(NativeExecutableSpec) {
            targetBuildTypes 'debug'
            sources.cpp {
                source {
                    srcDirs 'src/dev/native/cpp'
                    include '**/*.cpp'
                }
                exportedHeaders {
                    srcDirs 'src/dev/native/include'
                }
            }
            binaries.all {
                lib library: 'wpigui'
                lib project: ':thirdparty:imgui_suite', library: 'imguiSuite', linkage: 'static'
                project.addLibSdlGpuDependency(it)
            }
        }
    }
    binaries {
        all {
            if (it.targetPlatform.name == nativeUtils.wpi.platforms.systemcore) {
                it.buildable = false
                return
            }
        }
        withType(SharedLibraryBinarySpec) {
            buildable = false
        }
    }
}

apply from: 'publish.gradle'
